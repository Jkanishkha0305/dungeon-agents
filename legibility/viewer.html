<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Agents Trace Viewer</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel-bg: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --dim: #6e7681;
      --accent-a: #4488ff;
      --accent-b: #ff4444;
      --key: #f0c040;
      --door: #8b6914;
      --exit: #2d7a2d;
      --diverged: #ff6b6b;
      --font: 'JetBrains Mono', 'Fira Code', monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    button,
    input,
    summary {
      font: inherit;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .timeline {
      width: 200px;
      flex: 0 0 200px;
      border-right: 1px solid var(--border);
      background: var(--panel-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .timeline-header {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 10px;
    }

    .timeline-header .hint {
      color: var(--dim);
      font-size: 12px;
      line-height: 1.4;
    }

    .timeline-list {
      overflow: auto;
      padding: 6px;
      display: grid;
      gap: 4px;
    }

    .timeline-item {
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--text);
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 8px;
      cursor: pointer;
      line-height: 1.35;
    }

    .timeline-item:hover,
    .timeline-item:focus-visible {
      border-color: var(--border);
      outline: none;
    }

    .timeline-item.active {
      border-color: var(--accent-a);
      background: rgba(68, 136, 255, 0.12);
    }

    .timeline-item.diverged {
      color: var(--diverged);
    }

    .detail {
      flex: 1;
      min-width: 0;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hidden {
      display: none !important;
    }

    .load-state,
    .error-state,
    .narrow-state {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .terminal-prompt {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px 12px;
      background: var(--panel-bg);
      cursor: pointer;
    }

    .terminal-prompt input {
      display: none;
    }

    .cursor {
      width: 8px;
      height: 18px;
      background: var(--text);
      display: inline-block;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .error-banner,
    .divergence-banner {
      border: 1px solid var(--diverged);
      border-radius: 2px;
      padding: 10px 12px;
      background: rgba(255, 107, 107, 0.12);
      color: var(--diverged);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .turn-header {
      font-size: 24px;
      line-height: 1.2;
    }

    .meta {
      color: var(--dim);
      font-size: 13px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .view-toggle {
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--panel-bg);
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--panel-bg);
      padding: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(28px, 1fr));
      gap: 4px;
      max-width: 420px;
    }

    .cell {
      border: 1px solid var(--border);
      border-radius: 2px;
      min-height: 34px;
      display: grid;
      place-items: center;
      font-size: 18px;
      background: #1a1a2e;
      color: var(--text);
    }

    .cell.wall {
      background: #333;
    }

    .cell.key {
      color: var(--key);
    }

    .cell.door {
      color: var(--door);
    }

    .cell.exit {
      color: var(--exit);
    }

    .cell.agent-a {
      color: var(--accent-a);
      font-weight: 700;
    }

    .cell.agent-b {
      color: var(--accent-b);
      font-weight: 700;
    }

    .cell.unknown {
      background: #10151c;
      color: var(--dim);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }

    th {
      width: 150px;
      color: var(--dim);
      font-weight: 500;
    }

    details {
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--panel-bg);
      padding: 0;
    }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      border-bottom: 1px solid transparent;
    }

    details[open] summary {
      border-bottom-color: var(--border);
    }

    details > div {
      padding: 12px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow: auto;
      color: var(--text);
    }

    .belief-list {
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .belief-line {
      border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      padding-bottom: 8px;
    }

    .belief-key {
      color: var(--dim);
      margin-right: 8px;
    }

    @media (max-width: 899px) {
      .app {
        display: none;
      }

      .narrow-state {
        display: grid;
      }
    }

    @media (min-width: 900px) {
      .narrow-state {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="narrow-state">
    <div>&gt; viewport too narrow — resize to 900px+</div>
  </div>

  <div id="loadState" class="load-state">
    <div>
      <div style="margin-bottom: 16px;">&gt; load trace file</div>
      <label class="terminal-prompt">
        <span>&gt; load run</span>
        <span class="cursor"></span>
        <input id="fileInput" type="file" accept=".json,application/json">
      </label>
      <div style="margin-top: 14px; color: var(--dim);">Built against <code>runs/run_bb63ce09.json</code></div>
    </div>
  </div>

  <div id="errorState" class="error-state hidden">
    <div>
      <div class="error-banner">[ERROR] invalid trace format — expected run_id, turn fields</div>
      <div style="margin-top: 16px;">
        <label class="terminal-prompt">
          <span>&gt; load run</span>
          <span class="cursor"></span>
          <input id="fileInputError" type="file" accept=".json,application/json">
        </label>
      </div>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="timeline">
      <div class="timeline-header">
        <div id="runMeta"></div>
        <label class="terminal-prompt">
          <span>&gt; load run</span>
          <input id="fileInputSidebar" type="file" accept=".json,application/json">
        </label>
        <div class="hint">ArrowUp/Down: navigate turns<br>Space: toggle belief / ground truth</div>
      </div>
      <div id="timelineList" class="timeline-list"></div>
    </aside>
    <main class="detail">
      <div class="topbar">
        <div>
          <div id="turnHeader" class="turn-header"></div>
          <div id="turnMeta" class="meta"></div>
        </div>
      </div>

      <div id="divergenceBanner" class="divergence-banner hidden"></div>

      <div class="toggle-row">
        <button id="viewToggle" class="view-toggle" type="button">[ view: ground truth | belief ]</button>
        <div id="phaseMeta" class="meta"></div>
      </div>

      <section class="panel">
        <div id="grid" class="grid"></div>
      </section>

      <section class="panel">
        <table>
          <tbody id="toolTableBody"></tbody>
        </table>
      </section>

      <details open>
        <summary>Belief state</summary>
        <div id="beliefState" class="belief-list"></div>
      </details>

      <details open>
        <summary>LLM reasoning</summary>
        <div><pre id="llmOutput"></pre></div>
      </details>
    </main>
  </div>

  <script>
    const state = {
      payload: null,
      events: [],
      selectedIndex: 0,
      viewMode: "ground",
    };

    const loadState = document.getElementById("loadState");
    const errorState = document.getElementById("errorState");
    const app = document.getElementById("app");
    const timelineList = document.getElementById("timelineList");
    const runMeta = document.getElementById("runMeta");
    const turnHeader = document.getElementById("turnHeader");
    const turnMeta = document.getElementById("turnMeta");
    const phaseMeta = document.getElementById("phaseMeta");
    const divergenceBanner = document.getElementById("divergenceBanner");
    const grid = document.getElementById("grid");
    const toolTableBody = document.getElementById("toolTableBody");
    const beliefState = document.getElementById("beliefState");
    const llmOutput = document.getElementById("llmOutput");
    const viewToggle = document.getElementById("viewToggle");

    function bindFileInput(id) {
      const input = document.getElementById(id);
      input.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) {
          return;
        }
        try {
          const text = await file.text();
          const payload = JSON.parse(text);
          if (!payload || !payload.run_id || !Array.isArray(payload.events)) {
            throw new Error("invalid trace");
          }
          if (!payload.events.every((item) => typeof item.turn === "number")) {
            throw new Error("invalid trace");
          }
          loadTrace(payload);
        } catch (error) {
          showError();
        } finally {
          event.target.value = "";
        }
      });
    }

    bindFileInput("fileInput");
    bindFileInput("fileInputError");
    bindFileInput("fileInputSidebar");

    function showError() {
      loadState.classList.add("hidden");
      app.classList.add("hidden");
      errorState.classList.remove("hidden");
    }

    function loadTrace(payload) {
      state.payload = payload;
      state.events = payload.events;
      state.viewMode = "ground";
      state.selectedIndex = Math.max(state.events.findIndex((event) => event.diverged), 0);

      loadState.classList.add("hidden");
      errorState.classList.add("hidden");
      app.classList.remove("hidden");

      renderTimeline();
      renderSelectedEvent();
      scrollToSelected();
    }

    function renderTimeline() {
      timelineList.innerHTML = "";
      runMeta.innerHTML = `
        <div>${state.payload.run_id}</div>
        <div class="meta">turns: ${state.payload.total_turns} | result: ${state.payload.termination_reason}</div>
      `;

      state.events.forEach((event, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `timeline-item${event.diverged ? " diverged" : ""}${index === state.selectedIndex ? " active" : ""}`;
        const marker = event.diverged ? "◆" : "●";
        button.textContent = `[${String(event.turn).padStart(3, "0")}] ${marker} ${event.agent_id} — ${event.tool_name}`;
        button.addEventListener("click", () => {
          state.selectedIndex = index;
          renderTimeline();
          renderSelectedEvent();
        });
        timelineList.appendChild(button);
      });
    }

    function renderSelectedEvent() {
      const event = state.events[state.selectedIndex];
      if (!event) {
        return;
      }

      turnHeader.textContent = `Turn ${event.turn} — ${event.agent_id} — ${event.tool_name}`;
      turnMeta.textContent = `${event.timestamp} | model: ${event.llm_model} | llm ${event.llm_latency_ms.toFixed(1)}ms | tool ${event.tool_duration_ms.toFixed(1)}ms`;
      phaseMeta.textContent = `phase: ${event.game_phase} | at exit: ${event.agents_at_exit.join(", ") || "-"}`;
      viewToggle.textContent = `[ view: ${state.viewMode === "ground" ? "ground truth" : "belief"} | ${state.viewMode === "ground" ? "belief" : "ground truth"} ]`;

      if (event.diverged) {
        divergenceBanner.classList.remove("hidden");
        divergenceBanner.textContent = `diverged=true | reason=${event.divergence_reason || "unknown"}`;
      } else {
        divergenceBanner.classList.add("hidden");
        divergenceBanner.textContent = "";
      }

      renderGrid(event);
      renderToolTable(event);
      renderBeliefState(event);
      llmOutput.textContent = event.llm_output_text || "(empty)";
    }

    function renderGrid(event) {
      grid.innerHTML = "";
      const cells = state.viewMode === "ground"
        ? getGroundCells(event)
        : getBeliefCells(event);

      cells.forEach((cell) => {
        const element = document.createElement("div");
        const classes = ["cell"];
        const symbol = symbolForCell(cell, classes);
        element.className = classes.join(" ");
        element.textContent = symbol;
        const [row, col] = cell.position;
        element.title = `(${row}, ${col}) ${cell.terrain}${cell.item ? ` | ${cell.item}` : ""}${cell.occupants?.length ? ` | ${cell.occupants.join(",")}` : ""}`;
        grid.appendChild(element);
      });
    }

    function getGroundCells(event) {
      return event.world_state_snapshot.grid.flat();
    }

    function getBeliefCells(event) {
      const known = new Map(
        event.belief_state.known_cells.map((cell) => [cell.position.join(","), cell])
      );
      const cells = [];
      for (let row = 0; row < 8; row += 1) {
        for (let col = 0; col < 8; col += 1) {
          const key = `${row},${col}`;
          cells.push(
            known.get(key) || {
              position: [row, col],
              terrain: "unknown",
              item: null,
              occupants: [],
            }
          );
        }
      }
      return cells;
    }

    function symbolForCell(cell, classes) {
      const occupants = cell.occupants || [];
      if (occupants.includes("explorer_a")) {
        classes.push("agent-a");
        return "A";
      }
      if (occupants.includes("explorer_b")) {
        classes.push("agent-b");
        return "B";
      }
      if (cell.terrain === "wall") {
        classes.push("wall");
        return "█";
      }
      if (cell.terrain === "door_locked" || cell.terrain === "door_unlocked") {
        classes.push("door");
        return "D";
      }
      if (cell.terrain === "exit") {
        classes.push("exit");
        return "E";
      }
      if (cell.item === "key") {
        classes.push("key");
        return "K";
      }
      if (cell.terrain === "unknown") {
        classes.push("unknown");
        return " ";
      }
      return "·";
    }

    function renderToolTable(event) {
      const rows = [
        ["tool", event.tool_name],
        ["input", safeStringify(event.tool_input)],
        ["output", safeStringify(event.tool_output)],
        ["tool_success", String(event.tool_success)],
        ["diverged", String(event.diverged)],
      ];
      toolTableBody.innerHTML = rows
        .map(([label, value]) => `<tr><th>${label}</th><td><pre>${escapeHtml(value)}</pre></td></tr>`)
        .join("");
    }

    function renderBeliefState(event) {
      const entries = Object.entries(event.belief_state).map(([key, value]) => {
        return `<div class="belief-line"><span class="belief-key">${escapeHtml(key)}</span>${escapeHtml(
          typeof value === "string" ? value : safeStringify(value)
        )}</div>`;
      });
      beliefState.innerHTML = entries.join("");
    }

    function safeStringify(value) {
      return JSON.stringify(value, null, 2);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function scrollToSelected() {
      const selected = timelineList.children[state.selectedIndex];
      if (selected) {
        selected.scrollIntoView({ block: "center" });
      }
    }

    function moveSelection(delta) {
      if (!state.events.length) {
        return;
      }
      const nextIndex = Math.min(
        state.events.length - 1,
        Math.max(0, state.selectedIndex + delta)
      );
      if (nextIndex !== state.selectedIndex) {
        state.selectedIndex = nextIndex;
        renderTimeline();
        renderSelectedEvent();
        scrollToSelected();
      }
    }

    function toggleView() {
      if (!state.events.length) {
        return;
      }
      state.viewMode = state.viewMode === "ground" ? "belief" : "ground";
      renderSelectedEvent();
    }

    viewToggle.addEventListener("click", toggleView);

    window.addEventListener("keydown", (event) => {
      if (app.classList.contains("hidden")) {
        return;
      }
      if (event.key === "ArrowDown") {
        event.preventDefault();
        moveSelection(1);
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        moveSelection(-1);
      } else if (event.key === " ") {
        event.preventDefault();
        toggleView();
      }
    });
  </script>
</body>
</html>
